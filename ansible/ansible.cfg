[defaults]
inventory = inventory_gcp.yml
host_key_checking = False
remote_user = gcp_user

[ssh_connection]
# 關鍵：使用 IAP Tunnel 作為 ProxyCommand
# %h 會自動替換為 inventory 中的 instance name
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ProxyCommand="gcloud compute start-iap-tunnel %h %p --listen-on-stdin --project=demoproject0417 --zone=asia-east1-a"
